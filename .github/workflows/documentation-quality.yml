name: Documentation Quality

on:
  push:
    paths:
      - 'README.md'
      - '.github/workflows/documentation-quality.yml'
  pull_request:
    paths:
      - 'README.md'
      - '.github/workflows/documentation-quality.yml'

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint README.md --config .markdownlint.json

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cspell
        run: npm install -g cspell

      - name: Run spellcheck
        run: cspell README.md --config .cspell.json

  documentation-quality:
    name: Documentation Quality Check
    runs-on: ubuntu-latest
    needs: [markdown-lint, spellcheck]
    steps:
      - name: All checks passed
        run: echo "✅ All documentation quality checks passed!"
